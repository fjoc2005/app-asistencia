<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Asistencia - APP Asistencia</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <script src="version-control.js"></script>
    <link rel="stylesheet" href="styles.css?v=3.0.5">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="registro-page">
    <div class="registro-container">
        <div class="registro-card animate-scale-in">
            <div class="registro-header">
                <div class="logo-icon-small">
                    <i data-lucide="scan-line"></i>
                </div>
                <h2>Registro de Asistencia</h2>
                <p id="headerText">Escanea tu Carnet de Identidad o ingresa tu RUT</p>
            </div>

            <!-- Mode Switcher -->
            <div class="mode-switcher">
                <button class="mode-btn active" id="btnModeScan" onclick="switchMode('scan')">
                    <i data-lucide="qr-code"></i> Escanear
                </button>
                <button class="mode-btn" id="btnModeManual" onclick="switchMode('manual')">
                    <i data-lucide="keyboard"></i> Tipear
                </button>
            </div>

            <!-- QR Scanner Section -->
            <div id="scanSection" class="scan-section">
                <div id="reader"></div>
                <p class="scan-instruction">Apunta el código QR de tu carnet a la cámara</p>
            </div>

            <!-- RUT Input Section (Hidden by default) -->
            <form id="registroForm" class="registro-form" style="display: none;">
                <div class="form-group">
                    <label for="rut">
                        <i data-lucide="id-card"></i>
                        RUT
                    </label>
                    <div class="input-group">
                        <input type="tel" id="rut" name="rut" placeholder="12345678-9" maxlength="12" autocomplete="off"
                            inputmode="numeric">
                        <button type="button" class="btn-k" id="btnK">K</button>
                    </div>
                    <small class="input-hint">Formato: 12.345.678-9</small>
                </div>

                <button type="submit" class="btn-success btn-confirmar" id="btnConfirmar" disabled>
                    <i data-lucide="check-circle"></i>
                    CONFIRMAR ASISTENCIA
                </button>
            </form>

            <div id="userInfo" class="user-info" style="display: none;">
                <div class="user-card">
                    <i data-lucide="user" class="user-icon"></i>
                    <div class="user-details">
                        <span class="user-label">Nombre:</span>
                        <span id="userName" class="user-name"></span>
                    </div>
                </div>
            </div>

            <div id="errorMessage" class="error-message" style="display: none;">
                <i data-lucide="alert-circle"></i>
                <span></span>
            </div>

            <!-- Photo Capture Section Removed -->

            <div class="registro-footer">
                <a href="index.html" class="back-link">
                    <i data-lucide="arrow-left"></i>
                    Volver al inicio
                </a>
                <div class="branding-footer">
                    Desarrollado para <strong>Sintramae</strong>
                </div>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="successModal" class="modal" style="display: none;">
        <div class="modal-content success-animation">
            <div class="success-icon">
                <i data-lucide="check-circle"></i>
            </div>
            <h3>¡Asistencia Registrada!</h3>
            <p id="successMessage"></p>
            <p class="redirect-message">Redirigiendo al inicio...</p>
        </div>
    </div>

    <div class="background-decoration">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
    </div>

    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="google-drive.js?v=3.0.4"></script>
    <script src="app.js?v=3.0.4"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
